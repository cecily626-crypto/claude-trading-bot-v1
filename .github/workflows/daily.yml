name: daily-review

# 每天 00:00 UTC（= 北京时间早上 8 点）推送昨日交易复盘（1.0 多空账户 + 2.0 做空账户）
# GitHub 定时偶有几分钟到十几分钟延迟，属正常
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: daily paper review
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python daily_review.py
          python daily_review_short.py
