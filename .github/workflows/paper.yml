name: paper-account

# 2026-07-06 Phase 1 切换: 调度已迁移到 VPS (每 5 分钟, 见 deploy/README_DEPLOY.md)
# 此 workflow 仅保留手动触发作为备用通道, 避免与 VPS 双跑造成重复消息和状态冲突
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas numpy
      - name: run paper account
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPER_START: "2000"
        run: python paper_bot.py
      - name: save paper account
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add paper_account.json && git commit -m "paper account update" || true
          git pull --rebase --autostash || true
          git push || true
