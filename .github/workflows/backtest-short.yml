name: backtest-short

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: state-files
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: run v2.0-short backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python backtest_short.py
      - name: commit report
        run: |
          git config user.name "backtest-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash
          git add backtest_short_report.md backtest_short_results.json
          git diff --cached --quiet || git commit -m "v2.0-short backtest report"
          git push
