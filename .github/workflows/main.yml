name: signal-bot

# 2026-07-06 Phase 1 切换: 调度已迁移到 VPS (每 5 分钟, 见 deploy/README_DEPLOY.md)
# 此 workflow 仅保留手动触发作为备用通道, 避免与 VPS 双跑造成重复消息和状态冲突
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install pandas numpy

      - name: run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SIGNAL_MEME_ALL: "false"
        run: python signal_bot.py

      - name: save state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bot_state.json || true
          git commit -m "update bot state" || true
          git push || true
